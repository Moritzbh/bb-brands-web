<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Agentur OS · BB Brands</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Saira+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f6f8; --panel:#ffffff; --ink:#0d1017; --muted:#5b6573; --faint:#949cab;
    --line:#e7eaef; --line-2:#eef1f5; --blue:#0305C6; --blue-tint:#edefff; --blue-soft:#5b66e6;
    --ok:#0a7d4f; --ok-tint:#e7f7ee; --amber:#b45309; --amber-tint:#fdf3e3; --red:#c33;
    --shadow-sm:0 1px 2px rgba(13,16,23,.04),0 1px 1px rgba(13,16,23,.03);
    --shadow:0 1px 3px rgba(13,16,23,.05),0 8px 24px rgba(13,16,23,.06);
    --r:14px; --r-sm:10px;
    --side:248px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Inter Tight',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased;font-size:14.5px}
  a{color:inherit;text-decoration:none}
  .eyebrow{font-family:'Saira Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-weight:700;font-size:11px;color:var(--faint)}
  .tab-num{font-variant-numeric:tabular-nums}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#d6dae1;border-radius:9px;border:3px solid var(--bg)}

  /* ===== LOGIN ===== */
  #login{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:radial-gradient(120% 90% at 50% 0%,#fff,var(--bg));z-index:100;padding:24px}
  #login.show{display:flex}
  .login-card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:34px 30px;text-align:center}
  .login-card .lock{width:46px;height:46px;border-radius:12px;background:var(--blue-tint);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--blue)}
  .login-card h1{font-size:21px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
  .login-card p{color:var(--muted);font-size:13.5px;margin-bottom:20px}
  .login-card input{width:100%;font-family:inherit;font-size:15px;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;background:#fcfcfd;margin-bottom:10px}
  .login-card input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-tint)}
  .login-card button{width:100%;font-family:inherit;font-weight:700;font-size:15px;padding:13px;border:none;border-radius:11px;background:var(--ink);color:#fff;cursor:pointer}
  .login-card .err{color:var(--red);font-size:13px;font-weight:600;margin-top:10px;min-height:18px}

  /* ===== APP SHELL ===== */
  #app{display:none}
  #app.show{display:grid;grid-template-columns:var(--side) 1fr;min-height:100vh}
  .side{position:sticky;top:0;height:100vh;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px;border-bottom:1px solid var(--line-2);margin-bottom:14px}
  .brand .mk{width:34px;height:34px;border-radius:9px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;letter-spacing:-.04em}
  .brand .mk b{display:inline-block;transform:scaleX(-1)}
  .brand .nm{font-weight:800;font-size:15px;letter-spacing:-.02em;line-height:1.1}
  .brand .nm span{display:block;font-weight:500;font-size:11px;color:var(--faint);letter-spacing:.02em}
  .nav-grp{margin-bottom:6px}
  .nav-lbl{padding:12px 10px 6px;font-family:'Saira Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-weight:700;font-size:10.5px;color:var(--faint)}
  .nav-i{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--muted);font-weight:600;font-size:14px;cursor:pointer;transition:background .12s,color .12s;position:relative}
  .nav-i svg{width:18px;height:18px;flex:0 0 auto;stroke-width:2}
  .nav-i:hover{background:var(--line-2);color:var(--ink)}
  .nav-i.active{background:var(--blue-tint);color:var(--blue)}
  .nav-i.active::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--blue)}
  .nav-i .ext{margin-left:auto;color:var(--faint)}
  .side-foot{margin-top:auto;border-top:1px solid var(--line-2);padding-top:12px}
  .acct{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:9px}
  .acct .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-soft));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .acct .who{font-size:13px;font-weight:600;line-height:1.1}
  .acct .who span{display:block;font-size:11px;color:var(--faint);font-weight:500}
  .acct .out{margin-left:auto;color:var(--faint);cursor:pointer;padding:6px;border-radius:7px}
  .acct .out:hover{background:var(--line-2);color:var(--ink)}

  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:20;height:60px;background:rgba(245,246,248,.82);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 26px}
  .topbar .burger{display:none;width:36px;height:36px;border:1px solid var(--line);border-radius:9px;background:#fff;align-items:center;justify-content:center;cursor:pointer}
  .topbar h1{font-size:17px;font-weight:800;letter-spacing:-.02em}
  .topbar .sub{color:var(--faint);font-size:13px;font-weight:500}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .btn{font-family:inherit;font-weight:600;font-size:13.5px;padding:9px 14px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:border-color .12s,background .12s}
  .btn:hover{border-color:#d2d7df;background:#fcfcfd}
  .btn.pri{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.pri:hover{background:#1c2230}
  .btn svg{width:15px;height:15px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .seg button{font-family:inherit;font-size:13px;font-weight:600;padding:8px 12px;border:0;background:transparent;color:var(--muted);cursor:pointer}
  .seg button.on{background:var(--ink);color:#fff}
  .view{padding:26px;max-width:1180px;width:100%}
  .view.frame{padding:0;max-width:none}
  .crmframe{width:100%;height:calc(100vh - 61px);border:0;display:block;background:#f5f6fb}
  input.search,select.search{font-family:inherit;font-size:14px;padding:10px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;width:100%}
  input.search:focus,select.search:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-tint)}

  /* cards / kpis */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-sm);animation:rise .5s both}
  .kpi .lbl{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:12.5px;font-weight:600}
  .kpi .lbl .dot{width:8px;height:8px;border-radius:50%}
  .kpi .big{font-size:30px;font-weight:800;letter-spacing:-.03em;margin-top:8px;font-variant-numeric:tabular-nums}
  .kpi .ctx{font-size:12.5px;color:var(--faint);margin-top:3px;font-weight:500}
  .grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden;animation:rise .5s both}
  .panel-h{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line-2)}
  .panel-h h2{font-size:14.5px;font-weight:700;letter-spacing:-.01em}
  .panel-h a{font-size:12.5px;color:var(--blue);font-weight:600}
  .panel-b{padding:8px 18px 14px}
  /* funnel */
  .funnel{display:flex;align-items:stretch;gap:0;padding:18px}
  .fstep{flex:1;text-align:center;position:relative;padding:0 6px}
  .fstep .n{font-size:26px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
  .fstep .t{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
  .fstep .cv{position:absolute;right:-10px;top:14px;font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-tint);padding:2px 7px;border-radius:99px}
  .fstep+.fstep{border-left:1px solid var(--line-2)}
  /* rows */
  .row{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--line-2);font-size:13.5px}
  .row:first-child{border-top:0}
  .row .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
  .row .sub{color:var(--faint);font-size:12px;font-weight:500}
  .row .ct{font-weight:800;font-variant-numeric:tabular-nums}
  .bar{flex:0 0 110px;height:7px;background:var(--blue-tint);border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--blue);border-radius:99px}
  .pill{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;letter-spacing:.01em}
  .pill.red{background:#fdeceb;color:var(--red)} .pill.amber{background:var(--amber-tint);color:var(--amber)} .pill.ok{background:var(--ok-tint);color:var(--ok)} .pill.blue{background:var(--blue-tint);color:var(--blue)}
  .empty{text-align:center;color:var(--faint);padding:34px;font-size:13.5px}
  .err-b{background:#fdeceb;border:1px solid #f3c7c4;color:#9b2620;border-radius:10px;padding:12px 14px;font-size:13.5px;margin-bottom:14px}
  /* scans cards */
  .scard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:16px 18px;margin-bottom:12px}
  .scard .top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .scard .dom{font-size:16px;font-weight:800;letter-spacing:-.01em}
  .scard .dom a{color:var(--blue)}
  .scard .ts{font-size:12px;color:var(--faint)}
  .scard .nums{font-size:13px;color:var(--muted);margin:6px 0 10px}
  .scard .fz{font-size:14px;font-weight:600;margin-bottom:8px}
  .find{font-size:13px;padding:5px 0;border-top:1px solid var(--line-2);display:flex;gap:8px}
  .find:first-of-type{border-top:0}
  .sev{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:1px 5px;border-radius:5px;flex:0 0 auto;height:fit-content}
  .sev.High,.sev.Critical{background:#fdeceb;color:var(--red)} .sev.Medium{background:var(--amber-tint);color:var(--amber)} .sev.Low{background:var(--line-2);color:var(--muted)}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .skel{background:linear-gradient(90deg,#eef1f5,#f6f8fa,#eef1f5);background-size:200% 100%;animation:sh 1.2s infinite;border-radius:8px;height:14px}
  @keyframes sh{to{background-position:-200% 0}}
  /* mobile */
  .scrim{display:none;position:fixed;inset:0;background:rgba(13,16,23,.4);z-index:29}
  @media(max-width:820px){
    #app.show{grid-template-columns:1fr}
    .side{position:fixed;left:0;top:0;z-index:30;width:264px;transform:translateX(-100%);transition:transform .25s}
    .side.open{transform:none}
    .scrim.open{display:block}
    .topbar .burger{display:inline-flex}
    .view{padding:18px}
    .kpis{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <form class="login-card" id="loginForm">
    <div class="lock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <h1>BB Agentur OS</h1>
    <p>Internes Cockpit. Bitte einloggen.</p>
    <input type="password" id="loginToken" placeholder="Admin-Token" autocomplete="current-password">
    <button type="submit">Anmelden</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<!-- APP -->
<div id="app">
  <aside class="side" id="side">
    <div class="brand">
      <div class="mk"><b>B</b>B</div>
      <div class="nm">BB Brands<span>Agentur OS</span></div>
    </div>
    <nav id="nav"></nav>
    <div class="side-foot">
      <div class="acct">
        <div class="av">M</div>
        <div class="who">Moritz<span>Admin</span></div>
        <div class="out" id="logoutBtn" title="Abmelden"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></div>
      </div>
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <div class="main">
    <header class="topbar">
      <div class="burger" id="burger"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></div>
      <div><h1 id="ptitle">Übersicht</h1></div>
      <div class="right" id="pactions"></div>
    </header>
    <main class="view" id="view"></main>
  </div>
</div>

<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var KEY='bb_admin_token';
  var TOKEN=localStorage.getItem(KEY)||'';
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function eur(n){ if(n==null||isNaN(n)) return '–'; return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n); }
  function num(n){ return new Intl.NumberFormat('de-DE').format(n||0); }
  function dt(ts){ try{ return new Date(ts).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }
  function startOfToday(){ var d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
  async function api(path){ var sep=path.indexOf('?')>=0?'&':'?'; var r=await fetch(path+(TOKEN?sep+'token='+encodeURIComponent(TOKEN):''),{headers:TOKEN?{Authorization:'Bearer '+TOKEN}:{}}); if(r.status===401){ throw {auth:true}; } return r.json(); }

  // ---------- NAV ----------
  var NAV=[
    {grp:'Cockpit',items:[
      {id:'overview',label:'Übersicht',icon:'M3 13h8V3H3v10zm10 8h8V3h-8v18zM3 21h8v-6H3v6z'}
    ]},
    {grp:'Akquise',items:[
      {id:'leads',label:'Leads',icon:'M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75'},
      {id:'scans',label:'Profit-Analysen',icon:'M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM21 21l-4.35-4.35'},
      {id:'funnel',label:'Funnel',icon:'M22 3H2l8 9.46V19l4 2v-8.54L22 3z'}
    ]},
    {grp:'Insights',items:[
      {id:'analytics',label:'Analytics',icon:'M3 3v18h18M7 15l4-4 3 3 5-6'}
    ]},
    {grp:'Vertrieb',items:[
      {id:'outbound',label:'Outbound',icon:'M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z'},
      {id:'youtube',label:'YouTube Bewerbung',icon:'M22 8a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v8a4 4 0 0 0 4 4h12a4 4 0 0 0 4-4V8zM10 9l5 3-5 3V9z'}
    ]}
  ];
  function renderNav(active){
    $('nav').innerHTML=NAV.map(function(g){
      return '<div class="nav-grp"><div class="nav-lbl">'+g.grp+'</div>'+g.items.map(function(it){
        var ext=it.ext?' <span class="ext"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg></span>':'';
        return '<a class="nav-i'+(it.id===active?' active':'')+'" '+(it.ext?'href="'+it.ext+'"':'data-go="'+it.id+'"')+'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="'+it.icon+'"/></svg>'+it.label+ext+'</a>';
      }).join('')+'</div>';
    }).join('');
    $('nav').querySelectorAll('[data-go]').forEach(function(a){ a.addEventListener('click',function(){ location.hash='#/'+a.dataset.go; closeSide(); }); });
  }

  // ---------- VIEWS ----------
  var TITLES={overview:['Übersicht','Dein Agentur-Cockpit auf einen Blick'],scans:['Profit-Analysen','Gespeicherte KI-Analysen — suchen & per WhatsApp senden'],analytics:['Analytics','Traffic, Quellen & Klicks pro Seite']};
  function setHead(view){ $('ptitle').textContent=(TITLES[view]||['',''])[0]; $('pactions').innerHTML=''; }

  // OVERVIEW
  async function viewOverview(){
    setHead('overview');
    $('view').innerHTML='<div class="kpis">'+Array(4).fill('<div class="kpi"><div class="skel" style="width:50%"></div><div class="skel" style="width:70%;height:26px;margin-top:12px"></div></div>').join('')+'</div>';
    var leads=[],scans=[],pages=[],ptotal=0,pagesErr=false,authErr=false;
    try{ var dl=await api('/api/leads'); leads=dl.leads||(Array.isArray(dl)?dl:[]); }catch(e){ /* Leads-Fehler nicht fatal */ }
    try{ var ds=await api('/api/scans?days=365'); scans=ds.scans||[]; }catch(e){ if(e.auth)authErr=true; }
    try{ var dp=await (await fetch('/api/pages?days=30')).json(); pages=dp.pages||[]; ptotal=dp.total||0; }catch(e){ pagesErr=true; }
    if(authErr){ logout(); return; }
    var t0=startOfToday();
    function todayCount(arr){ return arr.filter(function(x){ return (x.ts||0)>=t0; }).length; }
    var diag=pages.filter(function(p){return p.path==='/gratis-profit-rechner';})[0]||{views:0,clicks:[]};
    function clickSum(re){ return (diag.clicks||[]).filter(function(c){return re.test(c.name||'');}).reduce(function(s,c){return s+c.count;},0); }
    var visits=diag.views||0, scanClicks=clickSum(/scann/i), waClicks=clickSum(/whatsapp/i);
    var kpi=[
      {l:'Leads gesamt',v:num(leads.length),c:'+'+todayCount(leads)+' heute',dot:'var(--blue)'},
      {l:'Profit-Analysen',v:num(scans.length),c:'+'+todayCount(scans)+' heute',dot:'var(--ok)'},
      {l:'Traffic (30 T)',v:num(ptotal),c:num(visits)+' auf /gratis-profit-rechner',dot:'var(--amber)'},
      {l:'WhatsApp-Klicks',v:num(waClicks),c:(visits?Math.round(waClicks/visits*100):0)+'% der Analyse-Besucher',dot:'var(--blue)'}
    ];
    var recent=scans.slice(0,6).map(function(s){
      var seg=s.segment==='red'?'red':s.segment==='yellow'?'amber':s.segment==='green'?'ok':'blue';
      return '<div class="row"><span class="nm">'+esc(s.domain||s.url||'?')+'<div class="sub">'+esc(dt(s.ts))+'</div></span>'+(s.leak_eur_month?'<span class="pill '+seg+'">'+esc(eur(s.leak_eur_month))+'/Mo</span>':'')+'</div>';
    }).join('')||'<div class="empty">Noch keine Analysen.</div>';
    $('view').innerHTML=
      '<div class="kpis">'+kpi.map(function(k,i){return '<div class="kpi" style="animation-delay:'+(i*60)+'ms"><div class="lbl"><span class="dot" style="background:'+k.dot+'"></span>'+k.l+'</div><div class="big">'+k.v+'</div><div class="ctx">'+k.c+'</div></div>';}).join('')+'</div>'+
      '<div class="grid2">'+
        '<div class="panel" style="animation-delay:120ms"><div class="panel-h"><h2>Profit-Analyse · Funnel (30 Tage)</h2><a href="#/analytics">Details</a></div>'+
          '<div class="funnel">'+
            '<div class="fstep"><div class="n tab-num">'+num(visits)+'</div><div class="t">Besuche</div><div class="cv">'+(visits?Math.round(scanClicks/visits*100):0)+'%</div></div>'+
            '<div class="fstep"><div class="n tab-num">'+num(scanClicks)+'</div><div class="t">Scan gestartet</div><div class="cv">'+(scanClicks?Math.round(waClicks/scanClicks*100):0)+'%</div></div>'+
            '<div class="fstep"><div class="n tab-num">'+num(waClicks)+'</div><div class="t">WhatsApp-Klick</div></div>'+
          '</div>'+(pagesErr?'<div style="padding:0 18px 14px;color:var(--faint);font-size:12px">Tracking-Daten noch leer.</div>':'')+'</div>'+
        '<div class="panel" style="animation-delay:180ms"><div class="panel-h"><h2>Neueste Analysen</h2><a href="#/scans">Alle</a></div><div class="panel-b">'+recent+'</div></div>'+
      '</div>';
  }

  // SCANS
  var scansCache=[];
  async function viewScans(){
    setHead('scans');
    $('pactions').innerHTML='<input class="search" id="scanQ" placeholder="Domain suchen…" style="width:230px"><button class="btn" id="scanReload">↻</button>';
    $('view').innerHTML='<div class="panel"><div class="panel-b"><div class="skel" style="width:40%;margin:10px 0"></div><div class="skel" style="width:80%;margin:10px 0"></div></div></div>';
    try{ var d=await api('/api/scans?days=365'); scansCache=d.scans||[]; }catch(e){ if(e.auth){logout();return;} $('view').innerHTML='<div class="err-b">Konnte Analysen nicht laden.</div>'; return; }
    var qEl=$('scanQ'); if(qEl){ qEl.oninput=function(){renderScans(qEl.value);}; }
    var rl=$('scanReload'); if(rl){ rl.onclick=function(){ scansCache=[]; viewScans(); }; }
    renderScans('');
  }
  function renderScans(q){
    q=(q||'').toLowerCase().trim();
    var list=q?scansCache.filter(function(s){return (s.domain||'').toLowerCase().indexOf(q)>=0||(s.url||'').toLowerCase().indexOf(q)>=0;}):scansCache;
    if(!list.length){ $('view').innerHTML='<div class="empty">Keine Analysen gefunden.</div>'; return; }
    $('view').innerHTML=list.map(function(s,i){
      var f=s.findings||{}, inp=s.inputs||{};
      var seg=s.segment==='red'?'red':s.segment==='yellow'?'amber':s.segment==='green'?'ok':'blue';
      var steps=(f.steps||[]).map(function(st){return '<div class="find"><span class="sev '+esc(st.severity||'')+'">'+esc(st.severity||'')+'</span><span><b>'+esc(st.step||'')+(st.hebel?' · '+esc(st.hebel):'')+'</b> '+esc(st.evidenz||'')+'</span></div>';}).join('');
      return '<div class="scard">'+
        '<div class="top"><span class="dom"><a href="'+esc(s.url||'#')+'" target="_blank" rel="noopener">'+esc(s.domain||s.url||'?')+'</a></span><span class="ts">'+esc(dt(s.ts))+'</span></div>'+
        '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">'+(s.segment?'<span class="pill '+seg+'">'+esc(s.segment)+'</span>':'')+(s.leak_eur_month?'<span class="pill blue">Leck '+esc(eur(s.leak_eur_month))+'/Mo</span>':'')+'</div>'+
        '<div class="nums">'+(inp.visitors||'?')+' Besucher/Mo · AOV '+esc(eur(inp.aov))+' · CR '+(inp.cr||'?')+'% · Marge '+(inp.margin||'?')+'%</div>'+
        (f.fazit?'<div class="fz">'+esc(f.fazit)+(f.engpass?' · Engpass: '+esc(f.engpass):'')+'</div>':'')+
        steps+
        '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn pri wa" data-i="'+i+'">💬 WhatsApp-Text + Report-Link</button><a class="btn" href="'+esc(reportUrl(s))+'" target="_blank" rel="noopener">🔗 Report öffnen</a><button class="btn copy" data-i="'+i+'">📋 Rohtext</button></div>'+
      '</div>';
    }).join('');
    $('view').querySelectorAll('.copy').forEach(function(b){ b.onclick=function(){ var s=list[+b.dataset.i]; var t=copyText(s); navigator.clipboard.writeText(t).then(function(){ b.textContent='✓ kopiert'; setTimeout(function(){b.textContent='📋 Rohtext';},1600); }).catch(function(){ prompt('Kopieren:',t); }); }; });
    $('view').querySelectorAll('.wa').forEach(function(b){ b.onclick=function(){ var s=list[+b.dataset.i]; var t=waPack(s); navigator.clipboard.writeText(t).then(function(){ b.textContent='✓ WhatsApp-Text kopiert'; setTimeout(function(){b.textContent='💬 WhatsApp-Text + Report-Link';},2000); }).catch(function(){ prompt('Kopieren:',t); }); }; });
  }
  function reportUrl(s){ return 'https://videos.bb-brands.de/analyse/?id='+encodeURIComponent(s.id||''); }
  function waPack(s){
    var f=s.findings||{}, L=[];
    L.push('Hey 👋 hier ist deine Profit-Analyse für '+(s.domain||s.url||'')+':'); L.push('');
    if(s.leak_eur_month) L.push('• Profit-Leck: rund '+eur(s.leak_eur_month)+'/Monat, aus demselben Traffic');
    if(f.engpass) L.push('• Größter Engpass: '+f.engpass);
    L.push('• Die wichtigsten Hebel + wie wir sie fixen, hab ich dir komplett aufbereitet:'); L.push('');
    L.push(reportUrl(s)); L.push('');
    L.push('Wenn du willst, schauen wir in 20 Min gemeinsam in deine Zahlen. Sag einfach Bescheid.');
    return L.join('\n');
  }
  function copyText(s){
    var f=s.findings||{}, i=s.inputs||{}, L=[];
    L.push('Profit-Analyse für '+(s.domain||s.url||''));L.push('');
    L.push('Deine Zahlen: '+(i.visitors||'?')+' Besucher/Mo · AOV '+eur(i.aov)+' · CR '+(i.cr||'?')+'% · Marge '+(i.margin||'?')+'%');
    if(s.leak_eur_month) L.push('Geschätztes Profit-Leck: ~'+eur(s.leak_eur_month)+'/Monat');
    if(f.engpass) L.push('Größter Engpass: '+f.engpass); L.push('');
    if(f.fazit){ L.push(f.fazit); L.push(''); }
    if(f.steps&&f.steps.length){ L.push('Gefundene Punkte:'); f.steps.forEach(function(st){ L.push('- '+(st.step||'')+(st.hebel?' ['+st.hebel+']':'')+' ('+(st.severity||'')+'): '+(st.evidenz||'')+(st.impact?' — '+st.impact:'')); }); L.push(''); }
    L.push('Die 3 wichtigsten Hebel + wie wir das konkret fixen, gehen wir am besten kurz durch. Wann passt dir?');
    return L.join('\n');
  }

  // ANALYTICS
  var anData=[],anCur=null,anDays=30;
  var PINS=[['/gratis-profit-rechner','Profit-Analyse'],['/','Homepage'],['/wissen','Wissens-Hub']];
  async function viewAnalytics(){
    setHead('analytics');
    $('pactions').innerHTML='<div class="seg" id="anSeg"><button data-d="7">7T</button><button data-d="30" class="on">30T</button><button data-d="90">90T</button></div>';
    $('view').innerHTML='<div class="panel"><div class="panel-b"><div class="skel" style="width:50%;margin:12px 0"></div><div class="skel" style="width:75%;margin:12px 0"></div></div></div>';
    var sg=$('anSeg'); if(sg){ sg.querySelectorAll('button').forEach(function(b){ b.onclick=function(){ sg.querySelectorAll('button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); anDays=+b.dataset.d; loadAn(); }; }); }
    loadAn();
  }
  function loadAn(){
    fetch('/api/pages?days='+anDays).then(function(r){return r.json();}).then(function(d){
      anData=d.pages||[]; if(!anCur||!page(anCur)) anCur=page('/gratis-profit-rechner')?'/gratis-profit-rechner':(anData[0]&&anData[0].path)||'/gratis-profit-rechner';
      renderAn(d.total||0);
    }).catch(function(){ $('view').innerHTML='<div class="err-b">Konnte Traffic nicht laden.</div>'; });
  }
  function page(p){ for(var i=0;i<anData.length;i++) if(anData[i].path===p) return anData[i]; return null; }
  function topRows(items,total){ if(!items||!items.length) return '<div class="empty">Keine Daten.</div>'; var max=items[0].count||1; return items.map(function(it){ var pc=total?Math.round(it.count/total*100):0; return '<div class="row"><span class="nm">'+esc(it.name)+'</span><span class="bar"><i style="width:'+Math.round(it.count/max*100)+'%"></i></span><span class="ct">'+it.count+(total?' · '+pc+'%':'')+'</span></div>'; }).join(''); }
  function renderAn(total){
    var paths=anData.map(function(d){return d.path;}); PINS.forEach(function(p){ if(paths.indexOf(p[0])<0) paths.unshift(p[0]); });
    var seen={}; paths=paths.filter(function(p){ if(seen[p])return 0; seen[p]=1; return 1; });
    var lbl={}; PINS.forEach(function(p){lbl[p[0]]=p[1];});
    var pins=PINS.map(function(p){return '<button class="btn'+(p[0]===anCur?' pri':'')+'" data-p="'+esc(p[0])+'">'+esc(p[1])+'</button>';}).join('');
    var opts=paths.map(function(p){var d=page(p);return '<option value="'+esc(p)+'"'+(p===anCur?' selected':'')+'>'+esc(p)+(d?' ('+d.views+')':' (0)')+'</option>';}).join('');
    var d=page(anCur);
    $('view').innerHTML=
      '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">'+pins+'</div>'+
      '<select class="search" id="anPage" style="margin-bottom:16px;max-width:420px">'+opts+'</select>'+
      (d?'<div class="kpis" style="grid-template-columns:1fr 1fr"><div class="kpi"><div class="lbl">Aufrufe</div><div class="big">'+num(d.views)+'</div></div><div class="kpi"><div class="lbl">Eindeutige Besucher</div><div class="big">'+num(d.uniques)+'</div></div></div>'+
        '<div class="grid2"><div class="panel"><div class="panel-h"><h2>Woher der Traffic kam</h2></div><div class="panel-b">'+topRows(d.sources,d.views)+'</div></div>'+
        '<div class="panel"><div class="panel-h"><h2>Was geklickt wurde</h2></div><div class="panel-b">'+topRows(d.clicks,0)+'</div></div></div>'
        :'<div class="empty">Für diese Seite noch keine Daten im Zeitraum.</div>')+
      '<div class="meta" style="color:var(--faint);font-size:12.5px;margin-top:14px">'+num(total)+' Aufrufe gesamt · '+anData.length+' Seiten · '+anDays+' Tage</div>';
    var sel=$('anPage'); if(sel) sel.onchange=function(){ anCur=sel.value; renderAn(total); };
    $('view').querySelectorAll('[data-p]').forEach(function(b){ b.onclick=function(){ anCur=b.dataset.p; renderAn(total); }; });
  }

  // CRM EMBED (Leads / Funnel / Outbound — eingebettet, eine Fläche)
  var CRM_VIEWS={leads:['cockpit','Leads / CRM'],funnel:['funnel','Funnel'],outbound:['outbound','Outbound'],youtube:['apps','YouTube Bewerbung']};
  function viewCRM(route){
    var cfg=CRM_VIEWS[route]||['cockpit','Leads / CRM'];
    $('ptitle').textContent=cfg[1];
    $('pactions').innerHTML='<a class="btn" href="/admin/crm.html#'+cfg[0]+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg>Vollbild</a>';
    $('view').classList.add('frame');
    $('view').innerHTML='<iframe class="crmframe" src="/admin/crm.html#'+cfg[0]+'" title="'+cfg[1]+'"></iframe>';
  }

  // ---------- ROUTER ----------
  var VIEWS={overview:viewOverview,scans:viewScans,analytics:viewAnalytics,
    leads:function(){viewCRM('leads');},funnel:function(){viewCRM('funnel');},outbound:function(){viewCRM('outbound');},youtube:function(){viewCRM('youtube');}};
  function route(){
    var v=(location.hash.replace('#/','')||'overview'); if(!VIEWS[v]) v='overview';
    $('view').classList.remove('frame'); renderNav(v); window.scrollTo(0,0); VIEWS[v]();
  }
  function closeSide(){ $('side').classList.remove('open'); $('scrim').classList.remove('open'); }

  // ---------- AUTH ----------
  function enter(){ $('login').classList.remove('show'); $('app').classList.add('show'); route(); }
  function logout(){ localStorage.removeItem(KEY); TOKEN=''; $('app').classList.remove('show'); $('login').classList.add('show'); $('loginToken').value=''; }
  $('loginForm').addEventListener('submit',function(e){
    e.preventDefault(); var t=$('loginToken').value.trim(); if(!t) return;
    $('loginErr').textContent='Prüfe…';
    fetch('/api/scans?days=1&token='+encodeURIComponent(t)).then(function(r){
      if(r.status===401){ $('loginErr').textContent='Token falsch.'; return; }
      TOKEN=t; localStorage.setItem(KEY,t); $('loginErr').textContent=''; enter();
    }).catch(function(){ $('loginErr').textContent='Verbindungsfehler.'; });
  });
  $('logoutBtn').addEventListener('click',logout);
  $('burger').addEventListener('click',function(){ $('side').classList.toggle('open'); $('scrim').classList.toggle('open'); });
  $('scrim').addEventListener('click',closeSide);
  window.addEventListener('hashchange',function(){ route(); closeSide(); });

  // boot
  if(TOKEN){ enter(); } else { $('login').classList.add('show'); }
})();
</script>
</body>
</html>
